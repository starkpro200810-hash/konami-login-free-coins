<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konami ID Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:url("https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a") center/cover no-repeat;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

.card{
position:relative;
z-index:2;
width:380px;
padding:30px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(15px);
border-radius:20px;
border:1px solid rgba(255,255,255,0.2);
color:white;
text-align:center;
}

h2{
color:#00d4ff;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff003c,#00d4ff);
color:white;
font-weight:bold;
cursor:pointer;
}

.switch{
margin-top:10px;
font-size:12px;
color:#aaa;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2 id="title">KONAMI ID</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="action()">Continue</button>

<div class="switch" onclick="toggle()">
Switch Login / Register
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, get, child } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBb-fJvDy_ND-IPQCDYTLX6amK8cKUM9hg",
authDomain: "my-web-7fd27.firebaseapp.com",
databaseURL: "https://my-web-7fd27-default-rtdb.firebaseio.com",
projectId: "my-web-7fd27",
storageBucket: "my-web-7fd27.firebasestorage.app",
messagingSenderId: "779268577717",
appId: "1:779268577717:web:6615ae67d3c2c8f46d61fc",
measurementId: "G-ENZK8B6L4Y"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.mode = "register";

window.toggle = function(){
window.mode = window.mode === "register" ? "login" : "register";
document.getElementById("title").innerText =
window.mode === "register" ? "KONAMI REGISTER" : "KONAMI LOGIN";
};

window.action = async function(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(window.mode === "register"){

await push(ref(db,"users"),{
name,
email,
password
});

alert("Account Created ⚽🔥");

}else{

const dbRef = ref(db);

get(child(dbRef,"users")).then(snapshot=>{
let ok = false;

snapshot.forEach(user=>{
let data = user.val();
if(data.email === email && data.password === password){
ok = true;
}
});

if(ok){
alert("Login Success ⚽");
}else{
alert("Invalid Login ❌");
}

});

}

};

</script>

</body>
</html>
